<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Password Generator</h2>

    <input type="text" id="password" readonly placeholder="Your password">

    <div class="password-actions">
        <button id="copyBtn" onclick="copyPassword()">Copy Password</button>
        <div id="strength" class="strength"></div>
    </div>

    <div class="options">
        <label><input type="checkbox" id="uppercase"> Include Uppercase</label>
        <label><input type="checkbox" id="numbers"> Include Numbers</label>
        <label><input type="checkbox" id="symbols"> Include Symbols</label>
    </div>

    <label>Password Length:
        <input type="number" id="length" value="8" min="4" max="20">
    </label>

    <button onclick="generatePassword()">Generate Password</button>
</div>

<script src="script.js"></script>
</body>
</html>
